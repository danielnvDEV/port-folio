<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 155 90" role="img" aria-label="DNV — Daniel Navacerrada Varón">
  <defs>
    <linearGradient id="gi" x1="0" y1="0" x2="155" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glowi" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- D: spine + arc con counter (evenodd) -->
  <path fill="url(#gi)" fill-rule="evenodd" filter="url(#glowi)" d="
    M 8,8 L 8,82 L 28,82
    C 56,82 63,66 63,45
    C 63,24 56,8  28,8 Z
    M 18,20 L 18,70 L 28,70
    C 49,70 53,59 53,45
    C 53,31 49,20 28,20 Z
  "/>

  <!-- N: franja diagonal conectando D y V -->
  <path fill="url(#gi)" filter="url(#glowi)"
        d="M 51,8 L 65,8 L 90,82 L 76,82 Z"/>

  <!-- V brazo izquierdo (desciende hacia el vértice) -->
  <path fill="url(#gi)" filter="url(#glowi)"
        d="M 79,8 L 93,8 L 110,82 L 96,82 Z"/>

  <!-- V brazo derecho (asciende desde el vértice) -->
  <path fill="url(#gi)" filter="url(#glowi)"
        d="M 96,82 L 110,82 L 145,8 L 131,8 Z"/>
</svg>
